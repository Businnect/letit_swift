name: Swift CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9.2"

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
        env:
          LETIT_API_TOKEN: ${{ secrets.LETIT_API_TOKEN }}
